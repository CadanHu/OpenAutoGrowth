<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenAutoGrowth</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="description" content="Closed-loop AI growth engine: content generation, smart execution, data analysis, and autonomous optimization.">
</head>
<body>
    <div id="app">
        <!-- ── AppShell: Navbar (rendered by src/ui/shell.js) ──────── -->
        <nav id="app-navbar" aria-label="Main navigation"></nav>

        <!-- ── Router Outlet: pages render here ────────────────────── -->
        <main id="app-outlet"></main>

        <!-- ── AppShell: Footer ────────────────────────────────────── -->
        <footer id="app-footer"></footer>
    </div>

    <!-- ══════════════════════════════════════════════════════════════
         Global Modals (persist across route changes)
         ══════════════════════════════════════════════════════════════ -->

    <!-- ── Launch Campaign Modal ─────────────────────────────────── -->
    <div id="launch-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 data-i18n="modal_launch_title">Create New Campaign</h3>
                <button id="btn-close-launch-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <!-- Campaign type tabs -->
                <div class="campaign-type-tabs" role="tablist">
                    <button class="tab-btn active" data-type="ecom"><span data-i18n="tab_ecom">Physical Product</span></button>
                    <button class="tab-btn" data-type="software"><span data-i18n="tab_software">Software/App</span></button>
                    <button class="tab-btn" data-type="lead"><span data-i18n="tab_lead">Lead Gen</span></button>
                </div>

                <!-- URL + AI analyze -->
                <div class="input-group">
                    <label><span id="label-url">Product URL</span></label>
                    <div style="display:flex; gap:8px;">
                        <input type="url" id="promo-url-input" class="modal-input" style="flex:1;" placeholder="https://amazon.com/dp/...">
                        <button id="btn-analyze-url" class="btn btn-secondary" style="white-space:nowrap;">
                            <span id="analyze-icon"></span>
                            <span data-i18n="btn_analyze">AI Analyze</span>
                        </button>
                    </div>
                </div>

                <div id="location-group" class="input-group">
                    <label data-i18n="label_location">Target Location</label>
                    <select id="promo-location-select" class="modal-input">
                        <option value="US">United States (US)</option>
                        <option value="CN">China (CN)</option>
                        <option value="EU">Europe (EU)</option>
                        <option value="SEA">Southeast Asia (SEA)</option>
                        <option value="Global">Global / Online</option>
                    </select>
                </div>

                <div class="input-group">
                    <label data-i18n="label_promo_desc">Campaign Description</label>
                    <textarea id="promo-goal-input" class="modal-textarea" placeholder="Briefly describe your campaign goals..."></textarea>
                </div>

                <div class="input-row">
                    <div class="input-group" style="flex:1.5;">
                        <label data-i18n="label_promo_objective">Objective</label>
                        <select id="promo-objective-select" class="modal-input">
                            <option value="growth">GitHub Stars / User Growth</option>
                            <option value="awareness">Brand Awareness</option>
                            <option value="conversion">Sales Conversion</option>
                            <option value="traffic">Website Traffic</option>
                        </select>
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label data-i18n="label_promo_kpi">Target KPI</label>
                        <div style="display:flex; align-items:center; gap:6px;">
                            <input type="number" id="promo-kpi-input" class="modal-input" value="3.0" step="0.1">
                            <span id="kpi-unit" style="font-size:12px; color: var(--text-tertiary);">ROAS</span>
                        </div>
                    </div>
                </div>

                <div class="input-row">
                    <div class="input-group" style="flex:1;">
                        <label data-i18n="label_promo_budget">Total Budget (CNY)</label>
                        <input type="number" id="promo-budget-input" class="modal-input" value="10000" min="100">
                    </div>
                    <div class="input-group" style="flex:1;">
                        <label data-i18n="label_promo_duration">Duration (Days)</label>
                        <input type="number" id="promo-duration-input" class="modal-input" value="7" min="1">
                    </div>
                </div>

                <div class="input-group">
                    <label data-i18n="label_promo_channels">Target Channels</label>
                    <div class="channel-grid">
                        <div class="channel-card active" data-channel="zhihu">
                            <span class="channel-icon">知</span>
                            <span class="channel-name">Zhihu</span>
                        </div>
                        <div class="channel-card" data-channel="tiktok">
                            <span class="channel-icon">T</span>
                            <span class="channel-name">TikTok</span>
                        </div>
                        <div class="channel-card" data-channel="meta">
                            <span class="channel-icon">f</span>
                            <span class="channel-name">Meta</span>
                        </div>
                        <div class="channel-card" data-channel="google">
                            <span class="channel-icon">G</span>
                            <span class="channel-name">Google</span>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-cancel-launch" class="btn btn-secondary" data-i18n="btn_cancel">Cancel</button>
                <button id="btn-confirm-launch" class="btn btn-primary">
                    <span data-i18n="btn_launch_now">Launch Campaign</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ── History Modal ────────────────────────────────────────── -->
    <div id="history-modal" class="modal">
        <div class="modal-content" style="max-width:1000px;">
            <div class="modal-header">
                <h3><span id="library-modal-title" data-i18n="modal_history_title">Article History</span></h3>
                <button id="btn-close-history-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="history-list" class="history-grid"></div>
            </div>
            <div class="modal-footer">
                <button id="btn-close-history" class="btn btn-secondary" data-i18n="btn_close">Close</button>
            </div>
        </div>
    </div>

    <!-- ── Campaign History Modal ───────────────────────────────── -->
    <div id="campaign-modal" class="modal">
        <div class="modal-content" style="max-width:1000px;">
            <div class="modal-header">
                <h3><span data-i18n="modal_campaign_history_title">Campaign History</span></h3>
                <button id="btn-close-campaign-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="campaign-list" class="history-grid"></div>
            </div>
            <div class="modal-footer">
                <button id="btn-close-campaign" class="btn btn-secondary" data-i18n="btn_close">Close</button>
            </div>
        </div>
    </div>

    <!-- ── Article Preview Modal ────────────────────────────────── -->
    <div id="article-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3><span data-i18n="modal_article_title">Preview Article</span></h3>
                <button id="btn-close-modal" class="close-btn" aria-label="Close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="input-group">
                    <label data-i18n="label_article_title">Title</label>
                    <input type="text" id="article-title-input" class="modal-input">
                </div>
                <div class="input-group">
                    <label data-i18n="label_article_body">Content (Markdown)</label>
                    <textarea id="article-body-input" class="modal-textarea" style="min-height:280px;"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button id="btn-cancel-article" class="btn btn-secondary" data-i18n="btn_cancel">Cancel</button>
                <button id="btn-publish-article" class="btn btn-primary" data-i18n="btn_publish">Publish to Zhihu</button>
            </div>
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>
</html>
