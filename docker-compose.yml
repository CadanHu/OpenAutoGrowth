version: "3.9"

services:
  # ── Infrastructure ────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    container_name: oag_postgres
    environment:
      POSTGRES_DB: openautogrowth
      POSTGRES_USER: oag
      POSTGRES_PASSWORD: oag_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oag -d openautogrowth"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: oag_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oag_backend
    ports:
      - "9393:9393"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://oag:oag_pass@postgres:5432/openautogrowth
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 9393 --reload

  arq_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oag_worker
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://oag:oag_pass@postgres:5432/openautogrowth
      REDIS_URL: redis://redis:6379/0
      ARQ_REDIS_URL: redis://redis:6379/1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: arq app.tasks.agent_tasks.WorkerSettings

  # ── Frontend ──────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: oag_frontend
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "7373:7373"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  # ── Dev Tools ─────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: oag_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@oag.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    profiles:
      - tools

volumes:
  pg_data:
  redis_data:
